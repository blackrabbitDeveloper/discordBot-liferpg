categories:
  건강:
    quests:
      - title: "물 한 잔 마시기"
        description: "일어나서 물 한 잔을 마셔보세요"
        estimated_minutes: 1
        difficulty: easy
        energy: [low, normal, high]
        time_budget: [short, medium, long]
      - title: "5분 스트레칭"
        description: "간단한 전신 스트레칭을 해보세요"
        estimated_minutes: 5
        difficulty: easy
        energy: [low, normal, high]
        time_budget: [short, medium, long]
      - title: "10분 걷기"
        description: "가볍게 동네를 걸어보세요"
        estimated_minutes: 10
        difficulty: normal
        energy: [normal, high]
