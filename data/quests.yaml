categories:
  건강:
    quests:
      # easy (4개)
      - title: "물 한 잔 마시기"
        description: "일어나서 물 한 잔을 마셔보세요"
        estimated_minutes: 1
        difficulty: easy
        energy: [low, normal, high]
        time_budget: [short, medium, long]
      - title: "5분 스트레칭"
        description: "간단한 전신 스트레칭을 해보세요"
        estimated_minutes: 5
        difficulty: easy
        energy: [low, normal, high]
        time_budget: [short, medium, long]
      - title: "수면 준비 체크"
        description: "잠자기 30분 전 전자기기를 멀리 두세요"
        estimated_minutes: 5
        difficulty: easy
        energy: [low, normal, high]
        time_budget: [short, medium, long]
      - title: "자세 바로잡기"
        description: "지금 앉은 자세를 확인하고 바르게 고쳐보세요"
        estimated_minutes: 1
        difficulty: easy
        energy: [low, normal, high]
        time_budget: [short, medium, long]
      # normal (2개)
      - title: "10분 걷기"
        description: "가볍게 동네를 걸어보세요"
        estimated_minutes: 10
        difficulty: normal
        energy: [normal, high]
        time_budget: [medium, long]
      - title: "건강한 간식 준비"
        description: "과일이나 견과류로 간식을 준비해보세요"
        estimated_minutes: 10
        difficulty: normal
        energy: [normal, high]
        time_budget: [medium, long]
      # hard (1개)
      - title: "20분 유산소 운동"
        description: "걷기, 달리기, 자전거 중 하나를 선택하세요"
        estimated_minutes: 20
        difficulty: hard
        energy: [normal, high]
        time_budget: [medium, long]

  회복:
    quests:
      # easy (6개)
      - title: "심호흡 3분"
        description: "편안한 자세로 깊게 호흡하세요"
        estimated_minutes: 3
        difficulty: easy
        energy: [low, normal, high]
        time_budget: [short, medium, long]
      - title: "5분 명상"
        description: "조용한 곳에서 눈을 감고 쉬세요"
        estimated_minutes: 5
        difficulty: easy
        energy: [low, normal, high]
        time_budget: [short, medium, long]
      - title: "좋아하는 음악 1곡 듣기"
        description: "좋아하는 노래를 하나 골라 편하게 들으세요"
        estimated_minutes: 5
        difficulty: easy
        energy: [low, normal, high]
        time_budget: [short, medium, long]
      - title: "창밖 바라보기 3분"
        description: "잠시 화면에서 눈을 떼고 먼 곳을 바라보세요"
        estimated_minutes: 3
        difficulty: easy
        energy: [low, normal, high]
        time_budget: [short, medium, long]
      - title: "따뜻한 차 한 잔"
        description: "좋아하는 차를 천천히 마셔보세요"
        estimated_minutes: 5
        difficulty: easy
        energy: [low, normal, high]
        time_budget: [short, medium, long]
      - title: "감사한 것 3가지 적기"
        description: "오늘 감사한 것 3가지를 메모하세요"
        estimated_minutes: 3
        difficulty: easy
        energy: [low, normal, high]
        time_budget: [short, medium, long]

  집중:
    quests:
      # easy (3개)
      - title: "5분 정리"
        description: "책상 위 또는 주변을 5분간 정리하세요"
        estimated_minutes: 5
        difficulty: easy
        energy: [low, normal, high]
        time_budget: [short, medium, long]
      - title: "할 일 우선순위 정하기"
        description: "오늘 할 일 중 가장 중요한 것 하나를 정하세요"
        estimated_minutes: 3
        difficulty: easy
        energy: [low, normal, high]
        time_budget: [short, medium, long]
      - title: "알림 끄기 5분"
        description: "5분간 알림을 끄고 한 가지에 집중해보세요"
        estimated_minutes: 5
        difficulty: easy
        energy: [low, normal, high]
        time_budget: [short, medium, long]
      # normal (2개)
      - title: "15분 집중 작업"
        description: "타이머를 맞추고 한 가지 일에 집중하세요"
        estimated_minutes: 15
        difficulty: normal
        energy: [normal, high]
        time_budget: [medium, long]
      - title: "방해 요소 제거 + 10분 작업"
        description: "주변을 정리하고 10분간 몰입하세요"
        estimated_minutes: 15
        difficulty: normal
        energy: [normal, high]
        time_budget: [medium, long]
      # hard (1개)
      - title: "25분 뽀모도로"
        description: "25분 집중 + 5분 휴식 한 세트를 해보세요"
        estimated_minutes: 30
        difficulty: hard
        energy: [high]
        time_budget: [long]

  "일/커리어":
    quests:
      # easy (3개)
      - title: "오늘 할 일 3개 적기"
        description: "오늘 해야 할 가장 중요한 일 3개를 적으세요"
        estimated_minutes: 3
        difficulty: easy
        energy: [low, normal, high]
        time_budget: [short, medium, long]
      - title: "이메일/메시지 정리"
        description: "읽지 않은 메시지를 확인하고 정리하세요"
        estimated_minutes: 5
        difficulty: easy
        energy: [low, normal, high]
        time_budget: [short, medium, long]
      - title: "내일 할 일 미리 적기"
        description: "퇴근 전 내일 할 일을 간단히 메모하세요"
        estimated_minutes: 3
        difficulty: easy
        energy: [low, normal, high]
        time_budget: [short, medium, long]
      # normal (2개)
      - title: "업무 관련 10분 행동"
        description: "미루던 업무 하나를 10분만 시작하세요"
        estimated_minutes: 10
        difficulty: normal
        energy: [normal, high]
        time_budget: [medium, long]
      - title: "회의/미팅 준비"
        description: "다음 회의에 필요한 자료를 10분간 정리하세요"
        estimated_minutes: 10
        difficulty: normal
        energy: [normal, high]
        time_budget: [medium, long]
      # hard (1개)
      - title: "30분 프로젝트 작업"
        description: "진행 중인 프로젝트에 30분을 투자하세요"
        estimated_minutes: 30
        difficulty: hard
        energy: [high]
        time_budget: [long]

  "정리/생활":
    quests:
      # easy (3개)
      - title: "설거지하기"
        description: "싱크대에 쌓인 설거지를 해치우세요"
        estimated_minutes: 10
        difficulty: easy
        energy: [low, normal, high]
        time_budget: [short, medium, long]
      - title: "빨래 돌리기"
        description: "빨래를 모아서 세탁기를 돌리세요"
        estimated_minutes: 5
        difficulty: easy
        energy: [low, normal, high]
        time_budget: [short, medium, long]
      - title: "쓰레기 버리기"
        description: "분리수거나 쓰레기를 정리하세요"
        estimated_minutes: 5
        difficulty: easy
        energy: [low, normal, high]
        time_budget: [short, medium, long]
      # normal (2개)
      - title: "방 정리 15분"
        description: "방 한 곳을 골라 15분간 정리하세요"
        estimated_minutes: 15
        difficulty: normal
        energy: [normal, high]
        time_budget: [medium, long]
      - title: "냉장고 정리"
        description: "유통기한 지난 것 확인하고 정리하세요"
        estimated_minutes: 10
        difficulty: normal
        energy: [normal, high]
        time_budget: [medium, long]
      # hard (1개)
      - title: "대청소 30분"
        description: "한 공간을 정해 30분간 집중 청소하세요"
        estimated_minutes: 30
        difficulty: hard
        energy: [high]
        time_budget: [long]

  공부:
    quests:
      # easy (3개)
      - title: "단어 5개 외우기"
        description: "공부 중인 분야의 핵심 단어 5개를 복습하세요"
        estimated_minutes: 5
        difficulty: easy
        energy: [low, normal, high]
        time_budget: [short, medium, long]
      - title: "어제 배운 것 복습"
        description: "어제 공부한 내용을 3분간 떠올려보세요"
        estimated_minutes: 3
        difficulty: easy
        energy: [low, normal, high]
        time_budget: [short, medium, long]
      - title: "관련 기사/글 1개 읽기"
        description: "공부 분야와 관련된 짧은 글을 하나 읽으세요"
        estimated_minutes: 5
        difficulty: easy
        energy: [low, normal, high]
        time_budget: [short, medium, long]
      # normal (2개)
      - title: "10분 독서"
        description: "읽고 있는 책을 10분간 읽으세요"
        estimated_minutes: 10
        difficulty: normal
        energy: [normal, high]
        time_budget: [medium, long]
      - title: "요약 노트 작성"
        description: "최근 배운 내용을 자기 말로 정리하세요"
        estimated_minutes: 15
        difficulty: normal
        energy: [normal, high]
        time_budget: [medium, long]
      # hard (1개)
      - title: "강의 1개 시청"
        description: "학습 중인 강의를 1개 들으세요"
        estimated_minutes: 30
        difficulty: hard
        energy: [high]
        time_budget: [long]

  창작:
    quests:
      # easy (3개)
      - title: "아이디어 3줄 정리"
        description: "떠오르는 아이디어를 3줄로 메모하세요"
        estimated_minutes: 3
        difficulty: easy
        energy: [low, normal, high]
        time_budget: [short, medium, long]
      - title: "영감 자료 수집"
        description: "관심 분야의 레퍼런스를 1개 저장하세요"
        estimated_minutes: 5
        difficulty: easy
        energy: [low, normal, high]
        time_budget: [short, medium, long]
      - title: "기존 작업 5분 리뷰"
        description: "이전에 만들던 작업물을 5분간 다시 살펴보세요"
        estimated_minutes: 5
        difficulty: easy
        energy: [low, normal, high]
        time_budget: [short, medium, long]
      # normal (2개)
      - title: "초안 10분 쓰기"
        description: "완벽하지 않아도 좋으니 10분만 써보세요"
        estimated_minutes: 10
        difficulty: normal
        energy: [normal, high]
        time_budget: [medium, long]
      - title: "기존 작업물 수정"
        description: "이전 작업에서 한 가지를 개선하세요"
        estimated_minutes: 15
        difficulty: normal
        energy: [normal, high]
        time_budget: [medium, long]
      # hard (1개)
      - title: "25분 집중 창작"
        description: "작업물에 25분을 온전히 투자하세요"
        estimated_minutes: 25
        difficulty: hard
        energy: [high]
        time_budget: [long]

  돈관리:
    quests:
      # easy (3개)
      - title: "오늘 지출 기록"
        description: "오늘 쓴 돈을 한 곳에 기록하세요"
        estimated_minutes: 3
        difficulty: easy
        energy: [low, normal, high]
        time_budget: [short, medium, long]
      - title: "영수증 정리"
        description: "모아둔 영수증을 확인하고 정리하세요"
        estimated_minutes: 3
        difficulty: easy
        energy: [low, normal, high]
        time_budget: [short, medium, long]
      - title: "충동구매 5초 룰"
        description: "오늘 사고 싶은 것이 있으면 5초 멈추고 생각하세요"
        estimated_minutes: 1
        difficulty: easy
        energy: [low, normal, high]
        time_budget: [short, medium, long]
      # normal (2개)
      - title: "불필요한 구독 1개 확인"
        description: "쓰지 않는 구독 서비스가 있는지 확인하세요"
        estimated_minutes: 5
        difficulty: normal
        energy: [normal, high]
        time_budget: [short, medium, long]
      - title: "주간 예산 점검"
        description: "이번 주 예산 대비 지출을 확인하세요"
        estimated_minutes: 10
        difficulty: normal
        energy: [normal, high]
        time_budget: [medium, long]
      # hard (1개)
      - title: "월간 재정 리뷰"
        description: "이번 달 수입/지출을 정리하고 다음 달 계획을 세우세요"
        estimated_minutes: 30
        difficulty: hard
        energy: [high]
        time_budget: [long]
